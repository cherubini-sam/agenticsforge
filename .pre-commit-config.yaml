# Hook chain (runs in order on every commit):
#   1. pre-commit-hooks — whitespace, EOF, YAML/JSON validity, secret detection

default_stages: [pre-commit]
default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
      - id: debug-statements
